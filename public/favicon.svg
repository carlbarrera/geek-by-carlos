<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Shiny Rayquaza 8-bit pixel-art favicon.
       Stylized serpent-dragon head with gold horns, a glaring red eye,
       a gold mouth stripe, and a tapering serpentine body curving down.
       Palette: Shiny Rayquaza black + gold + yellow/red eye. -->

  <!-- Dark rounded tile -->
  <rect width="16" height="16" rx="3" fill="#070b16"/>

  <!-- Horn tips (gold) -->
  <rect x="3"  y="1" width="1" height="2" fill="#fbbf24"/>
  <rect x="11" y="1" width="1" height="2" fill="#fbbf24"/>

  <!-- Horn bases (dark with gold accent) -->
  <rect x="2"  y="3" width="3" height="1" fill="#0f172a"/>
  <rect x="3"  y="3" width="1" height="1" fill="#fde047"/>
  <rect x="10" y="3" width="3" height="1" fill="#0f172a"/>
  <rect x="12" y="3" width="1" height="1" fill="#fde047"/>

  <!-- Head top (wide crown) -->
  <rect x="1"  y="4" width="14" height="1" fill="#0f172a"/>
  <rect x="6"  y="4" width="4" height="1" fill="#fbbf24"/>

  <!-- Head face row (full width) -->
  <rect x="0"  y="5" width="16" height="1" fill="#0f172a"/>

  <!-- Eye row (yellow ring + red iris) -->
  <rect x="0"  y="6" width="3" height="1" fill="#0f172a"/>
  <rect x="3"  y="6" width="1" height="1" fill="#fde047"/>
  <rect x="4"  y="6" width="1" height="1" fill="#dc2626"/>
  <rect x="5"  y="6" width="6" height="1" fill="#0f172a"/>
  <rect x="11" y="6" width="1" height="1" fill="#dc2626"/>
  <rect x="12" y="6" width="1" height="1" fill="#fde047"/>
  <rect x="13" y="6" width="3" height="1" fill="#0f172a"/>

  <!-- Below eyes (gold cheek lines, Rayquaza's fin hint) -->
  <rect x="0"  y="7" width="2" height="1" fill="#0f172a"/>
  <rect x="2"  y="7" width="1" height="1" fill="#fbbf24"/>
  <rect x="3"  y="7" width="10" height="1" fill="#0f172a"/>
  <rect x="13" y="7" width="1" height="1" fill="#fbbf24"/>
  <rect x="14" y="7" width="2" height="1" fill="#0f172a"/>

  <!-- Gold mouth stripe (Rayquaza's trademark yellow mouth line) -->
  <rect x="1"  y="8" width="3" height="1" fill="#0f172a"/>
  <rect x="4"  y="8" width="8" height="1" fill="#fbbf24"/>
  <rect x="12" y="8" width="3" height="1" fill="#0f172a"/>

  <!-- Jaw line -->
  <rect x="1"  y="9" width="14" height="1" fill="#0f172a"/>

  <!-- Body starts tapering -->
  <rect x="2"  y="10" width="12" height="1" fill="#0f172a"/>
  <rect x="2"  y="10" width="1" height="1" fill="#fbbf24"/>
  <rect x="13" y="10" width="1" height="1" fill="#fbbf24"/>

  <!-- Neck -->
  <rect x="3"  y="11" width="10" height="1" fill="#0f172a"/>

  <!-- Body curves (single gold stripe down middle = Rayquaza's belly) -->
  <rect x="4"  y="12" width="8" height="1" fill="#0f172a"/>
  <rect x="7"  y="12" width="2" height="1" fill="#fbbf24"/>

  <!-- Body narrowing -->
  <rect x="5"  y="13" width="6" height="1" fill="#0f172a"/>
  <rect x="6"  y="14" width="4" height="1" fill="#0f172a"/>

  <!-- Gold tail tip -->
  <rect x="7"  y="15" width="2" height="1" fill="#fbbf24"/>
</svg>
