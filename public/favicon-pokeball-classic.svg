<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Dark rounded background for the favicon tile -->
  <rect width="16" height="16" rx="3" fill="#070b16"/>

  <!-- 8-bit Pokéball pixel-art, centered in a 16x16 grid.
       Classic red top / white bottom with a bold black band and center button. -->

  <!-- Row 1: top outline -->
  <rect x="6" y="1" width="4" height="1" fill="#1f2937"/>

  <!-- Row 2 -->
  <rect x="4" y="2" width="2" height="1" fill="#1f2937"/>
  <rect x="6" y="2" width="4" height="1" fill="#ef4444"/>
  <rect x="10" y="2" width="2" height="1" fill="#1f2937"/>

  <!-- Row 3 -->
  <rect x="3" y="3" width="1" height="1" fill="#1f2937"/>
  <rect x="4" y="3" width="8" height="1" fill="#ef4444"/>
  <rect x="12" y="3" width="1" height="1" fill="#1f2937"/>

  <!-- Row 4 (highlight row on top-left for 3D feel) -->
  <rect x="2" y="4" width="1" height="1" fill="#1f2937"/>
  <rect x="3" y="4" width="2" height="1" fill="#fca5a5"/>
  <rect x="5" y="4" width="8" height="1" fill="#ef4444"/>
  <rect x="13" y="4" width="1" height="1" fill="#1f2937"/>

  <!-- Row 5 -->
  <rect x="2" y="5" width="1" height="1" fill="#1f2937"/>
  <rect x="3" y="5" width="10" height="1" fill="#ef4444"/>
  <rect x="13" y="5" width="1" height="1" fill="#1f2937"/>

  <!-- Row 6 -->
  <rect x="1" y="6" width="1" height="1" fill="#1f2937"/>
  <rect x="2" y="6" width="12" height="1" fill="#ef4444"/>
  <rect x="14" y="6" width="1" height="1" fill="#1f2937"/>

  <!-- Row 7: black band -->
  <rect x="1" y="7" width="14" height="1" fill="#1f2937"/>

  <!-- Row 8: button row (black sides, white center ring) -->
  <rect x="1" y="8" width="5" height="1" fill="#1f2937"/>
  <rect x="6" y="8" width="4" height="1" fill="#f3f4f6"/>
  <rect x="10" y="8" width="5" height="1" fill="#1f2937"/>

  <!-- Row 9: white bottom with inner button dot -->
  <rect x="1" y="9" width="1" height="1" fill="#1f2937"/>
  <rect x="2" y="9" width="5" height="1" fill="#f3f4f6"/>
  <rect x="7" y="9" width="2" height="1" fill="#1f2937"/>
  <rect x="9" y="9" width="5" height="1" fill="#f3f4f6"/>
  <rect x="14" y="9" width="1" height="1" fill="#1f2937"/>

  <!-- Row 10 -->
  <rect x="2" y="10" width="1" height="1" fill="#1f2937"/>
  <rect x="3" y="10" width="10" height="1" fill="#f3f4f6"/>
  <rect x="13" y="10" width="1" height="1" fill="#1f2937"/>

  <!-- Row 11 -->
  <rect x="2" y="11" width="1" height="1" fill="#1f2937"/>
  <rect x="3" y="11" width="10" height="1" fill="#f3f4f6"/>
  <rect x="13" y="11" width="1" height="1" fill="#1f2937"/>

  <!-- Row 12 -->
  <rect x="3" y="12" width="1" height="1" fill="#1f2937"/>
  <rect x="4" y="12" width="8" height="1" fill="#f3f4f6"/>
  <rect x="12" y="12" width="1" height="1" fill="#1f2937"/>

  <!-- Row 13 -->
  <rect x="4" y="13" width="2" height="1" fill="#1f2937"/>
  <rect x="6" y="13" width="4" height="1" fill="#f3f4f6"/>
  <rect x="10" y="13" width="2" height="1" fill="#1f2937"/>

  <!-- Row 14: bottom outline -->
  <rect x="6" y="14" width="4" height="1" fill="#1f2937"/>
</svg>
